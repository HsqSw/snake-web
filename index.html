<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Web</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app app-home">
      <h1>Snake Web</h1>

      <section class="card" aria-label="Game introduction">
        <h2>How to play</h2>
        <ul class="list">
          <li>Eat food to grow and score points.</li>
          <li>Avoid walls and your own body.</li>
          <li>Each food speeds up the game (down to 60ms).</li>
        </ul>

        <h2>Controls</h2>
        <ul class="list">
          <li>Move: Arrow Keys / WASD</li>
          <li>Restart (in game): R</li>
        </ul>

        <div class="home-actions">
          <a class="primary-btn" href="game.html">Start Game</a>
          <a class="link-btn" href="https://github.com/HsqSw/snake-web" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </section>

      <p class="muted">No parameters; always starts from this landing page.</p>
    </main>
  </body>
</html>
