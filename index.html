<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Web</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span>Speed: <strong id="speed">150</strong>ms</span>
      </div>
      <canvas id="game" width="400" height="400" aria-label="Snake game"></canvas>
      <div class="controls">
        <button id="restartBtn" type="button">Restart (R)</button>
        <p>Controls: Arrow Keys / WASD</p>
      </div>
      <p id="status" class="status">Press any direction key to start.</p>
    </main>
    <script src="game.js"></script>
  </body>
</html>
